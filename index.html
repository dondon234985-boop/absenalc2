<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face Attendance UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
  body { background: #f8f9fa; }
  #video-container { 
    position: relative; 
    width: 100%; 
    max-width: 400px; 
    margin: auto; 
    border-radius: 15px; 
    overflow: hidden; 
    background: #000; 
    line-height: 0; /* Menghilangkan celah bawah video */
  }
  video { width: 100%; display: block; }
  /* Canvas harus berada tepat di atas video */
  canvas { 
    position: absolute; 
    top: 0; 
    left: 0; 
    z-index: 5; 
    pointer-events: none; /* Agar klik tetap tembus ke tombol di bawah jika perlu */
  }
</style>
</head>
<body>

<div class="container py-4">
  <h3 class="text-center mb-4">Sistem Absensi (External Host)</h3>
  
  <!-- Bagian Video -->
  <div id="video-container" class="mb-3 shadow">
    <video id="video" autoplay muted playsinline></video>
	<canvas id="overlay"></canvas>
  </div>

  <div class="text-center mb-4">
    <span id="status" class="badge bg-secondary">Memuat Sistem...</span><br><br>
    <button id="btnAbsen" class="btn btn-primary" onclick="processAbsence()" disabled>Ambil Absen</button>
  </div>

  <!-- Form Registrasi -->
  <div class="card p-3 mb-4 shadow-sm">
    <h6>Pendaftaran Baru</h6>
    <input type="text" id="regNama" class="form-control mb-2" placeholder="Nama">
    <input type="text" id="regNIK" class="form-control mb-2" placeholder="NIK">
    <button id="btnReg" class="btn btn-outline-success w-100" onclick="register()">Daftar Wajah</button>
  </div>
</div>

<script>
  // GANTI DENGAN URL WEB APP GAS ANDA
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzaDkGzLcs_HzcaqtaKlMuVevysQ-tnQKxzutyMSStTNKePvrxcVOSxkdpAeWNFYRDC/exec"; 
  
  let labeledDescriptors = [];
  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  const status = document.getElementById('status');

  

  async function init() {
    const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
     status.innerText = "Memuat AI...";
	await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
      faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
      faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
      faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL)
    ]);

    // Aktifkan Kamera
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
	
	// Tunggu video mulai diputar untuk sinkronisasi kotak
    video.onplay = () => {
      startFaceTracking();
    };

    // Ambil Data Wajah dari GAS
    const faces = await callGAS({ action: "getFaces" });
    labeledDescriptors = faces.map(d => new faceapi.LabeledFaceDescriptors(d.name, [new Float32Array(d.descriptor)]));
    
    status.innerText = "Siap Digunakan";
    status.className = "badge bg-success";
    document.getElementById('btnAbsen').disabled = false;
  }
  
  // FUNGSI UNTUK MENGGAMBAR KOTAK REAL-TIME
  function startFaceTracking() {
    const displaySize = { width: video.videoWidth, height: video.videoHeight };
    faceapi.matchDimensions(canvas, displaySize);

    setInterval(async () => {
      // Deteksi hanya wajah (tidak perlu landmark/descriptor untuk kotak agar ringan)
      const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
      
      // Sesuaikan ukuran kotak dengan ukuran video yang tampil
      const resizedDetections = faceapi.resizeResults(detections, displaySize);
      
      // Bersihkan canvas dan gambar ulang kotak baru
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      faceapi.draw.drawDetections(canvas, resizedDetections);
    }, 300); // Update setiap 100ms
  }
  
  // Fungsi Komunikasi ke GAS (Menggantikan google.script.run)
  async function callGAS(data) {
    const response = await fetch(GAS_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });
    return await response.json();
  }

  async function processAbsence() {
  const btn = document.getElementById('btnAbsen');
  
  // 1. Kunci tombol, ubah teks dan warna
  btn.disabled = true;
  btn.innerText = "SEDANG MEMPROSES...";
  btn.className = "btn btn-secondary btn-lg shadow"; // Berubah jadi abu-abu

  status.innerText = "MENGENALI WAJAH...";
  status.className = "badge bg-warning text-dark p-2";

  try {
    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    
    if (!detection) {
      alert("Wajah tidak terdeteksi. Silakan coba lagi.");
      resetAbsenButton(); // Kembalikan tombol jika gagal
      return;
    }

    const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.6);
    const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
    
    if (bestMatch.label === 'unknown') {
      alert("Wajah tidak dikenali! Silakan registrasi dahulu.");
      resetAbsenButton();
    } else {
      navigator.geolocation.getCurrentPosition(async pos => {
        const loc = `${pos.coords.latitude},${pos.coords.longitude}`;
        
        status.innerText = "MENGIRIM DATA...";
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ 
            action: "attendance", 
            name: bestMatch.label, 
            type: "HADIR", 
            location: loc 
          })
        });
        
        await res.json();
        alert("BERHASIL: " + bestMatch.label + "\nLokasi dicatat.");
        resetAbsenButton();
      }, (err) => {
        alert("Gagal mengambil lokasi GPS. Pastikan GPS aktif.");
        resetAbsenButton();
      });
    }
  } catch (e) {
    alert("Terjadi kesalahan teknis.");
    resetAbsenButton();
  }
}

// Fungsi pembantu untuk mengaktifkan kembali tombol absen
function resetAbsenButton() {
  const btn = document.getElementById('btnAbsen');
  btn.disabled = false;
  btn.innerText = "AMBIL ABSEN";
  btn.className = "btn btn-primary btn-lg shadow";
  status.innerText = "SISTEM SIAP";
  status.className = "badge bg-success p-2";
}

  async function register() {
  const btn = document.getElementById('btnReg');
  const nama = document.getElementById('regNama').value;
  const nik = document.getElementById('regNIK').value;
  
  if(!nama || !nik) return alert("Isi Nama & NIK!");

  // 1. Kunci tombol registrasi
  btn.disabled = true;
  btn.innerText = "MENGIRIM DATA...";
  btn.className = "btn btn-secondary w-100";

  status.innerText = "MEREKAM WAJAH...";
  
  try {
    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    
    if(detection) {
      await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "register",
          name: nama,
          nik: nik,
          descriptor: Array.from(detection.descriptor)
        })
      });
      alert("Karyawan Berhasil Didaftarkan!");
      location.reload(); // Refresh akan mengaktifkan tombol kembali secara otomatis
    } else {
      alert("Wajah tidak terdeteksi!");
      resetRegButton();
    }
  } catch (e) {
    alert("Gagal mendaftar.");
    resetRegButton();
  }
}

function resetRegButton() {
  const btn = document.getElementById('btnReg');
  btn.disabled = false;
  btn.innerText = "Daftar Wajah";
  btn.className = "btn btn-outline-success w-100";
  status.innerText = "SISTEM SIAP";
}

  window.onload = init;
</script>
</body>
</html>
